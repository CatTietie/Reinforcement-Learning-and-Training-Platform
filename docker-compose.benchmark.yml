version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: rl_experiments
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  benchmark:
    build:
      context: .
      dockerfile: Dockerfile.benchmark
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/rl_experiments
    volumes:
      - ./reports:/app/reports
    command: python cli.py benchmark --suite benchmarks/cartpole_suite.yaml

volumes:
  pgdata:
